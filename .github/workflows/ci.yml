name: CI
on:
  push:
    branches: [main]
  pull_request:
# Cancel in-progress runs for the same branch/PR when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Unit tests are pure logic — they set/clear their own process.env,
      # so no database or secrets are needed here.
      - run: npm run test:unit
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # TEST_-prefixed secrets mapped to the names the app reads, so the
    # suite hits the test DB/secret — never production. When
    # TEST_DATABASE_URL is unset, the steps below are skipped and the
    # job stays green (no integration tests wired up yet).
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.TEST_AUTH_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Migrate test database
        if: env.DATABASE_URL != ''
        run: npm run db:migrate
      - name: Run integration tests
        if: env.DATABASE_URL != ''
        run: npm run test:integration
      - name: Skip notice
        if: env.DATABASE_URL == ''
        run: echo "TEST_DATABASE_URL not set — skipping integration tests."
